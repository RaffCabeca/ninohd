<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="chick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- glow behind chick -->
  <circle cx="60" cy="64" r="40" fill="#ffffff" opacity="0.08"/>

  <!-- tuft feathers -->
  <path d="M60 20 C56 10 50 12 52 22 C54 26 60 26 60 20Z" fill="url(#chick)"/>
  <path d="M60 19 C60 8 68 9 66 20 C64 25 60 25 60 19Z" fill="url(#chick)"/>
  <path d="M60 21 C64 12 72 15 68 24 C65 27 60 26 60 21Z" fill="url(#chick)"/>

  <!-- head -->
  <circle cx="60" cy="60" r="34" fill="url(#chick)"/>
  <!-- cheek shading -->
  <ellipse cx="60" cy="72" rx="30" ry="20" fill="#F59E0B" opacity="0.18"/>

  <!-- cheeks blush -->
  <circle cx="34" cy="68" r="6" fill="#FB7185" opacity="0.45"/>
  <circle cx="86" cy="68" r="6" fill="#FB7185" opacity="0.45"/>

  <!-- beak -->
  <path d="M60 66 L52 72 L60 78 L68 72 Z" fill="url(#beak)"/>
  <path d="M60 72 L52 72 L60 78 Z" fill="#C2410C" opacity="0.5"/>

  <!-- ===== 3D CINEMA GLASSES ===== -->
  <!-- temple arms -->
  <path d="M26 54 L14 50" stroke="#141422" stroke-width="4" stroke-linecap="round"/>
  <path d="M94 54 L106 50" stroke="#141422" stroke-width="4" stroke-linecap="round"/>

  <!-- left lens (red) -->
  <rect x="26" y="46" width="26" height="20" rx="9" fill="#F43F5E" opacity="0.9"/>
  <rect x="26" y="46" width="26" height="20" rx="9" fill="none" stroke="#141422" stroke-width="4"/>
  <!-- right lens (cyan) -->
  <rect x="68" y="46" width="26" height="20" rx="9" fill="#22D3EE" opacity="0.9"/>
  <rect x="68" y="46" width="26" height="20" rx="9" fill="none" stroke="#141422" stroke-width="4"/>
  <!-- bridge -->
  <path d="M52 54 Q60 50 68 54" fill="none" stroke="#141422" stroke-width="4" stroke-linecap="round"/>

  <!-- lens highlights -->
  <rect x="30" y="49" width="7" height="4" rx="2" fill="#ffffff" opacity="0.55"/>
  <rect x="72" y="49" width="7" height="4" rx="2" fill="#ffffff" opacity="0.55"/>

  <!-- tiny eyes glinting under lenses -->
  <circle cx="39" cy="57" r="2.4" fill="#141422"/>
  <circle cx="81" cy="57" r="2.4" fill="#141422"/>
</svg>
